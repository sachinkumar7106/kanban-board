<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <div class="left">Kanban</div>
            <div class="right">
                <button id="sound-toggle" type="button" aria-pressed="true">Sound: On</button>
                <button id="toggle-modal">Add New Task</button>
            </div>
        </nav>
        
        <section class="board">
            <div id="todo"class="task-col">
                <div class="heading">
                    <div class="left">To Do</div>
                    <div class="right">Count : 0</div>
                </div>
                
            </div>
            <div id="inprogress" class="task-col">
                <div class="heading">
                    <div class="left">In Progress</div>
                    <div class="right">Count : 0</div>
                </div>
            </div>
            <div id="done" class="task-col">
                <div class="heading">
                    <div class="left">Done</div>
                    <div class="right">Count : 0</div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal add-new-task">
        <div class="bg"></div>
        <div class="center">
            <input id="task-title" type="text" placeholder="Task Title">
            <textarea id="task-description" placeholder="Task Description"></textarea>
            <button id="add-new-task"class="add-task-btn">Add Task</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
